name: Bug report
description: Report a reproducible problem in pdfgenrs
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please include enough detail for us to reproduce and investigate.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps we can follow.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share relevant runtime details.
      placeholder: |
        - pdfgenrs version:
        - OS:
        - Rust version:
        - Deployment environment:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste relevant logs, stack traces, or screenshots.
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other details that can help.
