name: Criterion benchmark
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.MD'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.MD'
      - '.gitignore'

jobs:
  benchmark:
    name: Run Criterion benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Run Criterion benchmark
        run: cargo bench --bench criterion_bench
      - name: Upload Criterion HTML report
        uses: actions/upload-artifact@v4
        with:
          name: criterion-report
          path: target/criterion/report/
      - name: Add benchmark report link to summary
        run: echo '## Criterion Benchmark Report uploaded as artifact `criterion-report`' >> $GITHUB_STEP_SUMMARY
