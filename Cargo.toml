[package]
name = "pdfgenrs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pdfgenrs"
path = "src/main.rs"

[dependencies]
tokio = { version = "1.52.1", features = ["macros", "rt-multi-thread", "sync", "net", "signal"] }
axum = "0.8.9"
serde_json = "1.0.149"
chrono = "0.4.44"
walkdir = "2.5.0"
anyhow = "1.0.102"
comemo = "0.5.1"
typst = "0.14.2"
typst-pdf = "0.14.2"
typst-library = "0.14.2"
typst-syntax = "0.14.2"
log4rs = "1.4.0"
log = "0.4.29"

[dev-dependencies]
axum-test = "20.0.0"
reqwest = { version = "0.13.2", features = ["json"] }
tempfile = "3.27.0"
