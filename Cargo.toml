[package]
name = "pdfgenrs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pdfgenrs"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.8"
serde_json = "1"
chrono = "0.4"
walkdir = "2"
anyhow = "1"
comemo = "0.5"
typst = "0.14"
typst-pdf = "0.14"
typst-library = "0.14"
typst-syntax = "0.14"
log4rs = "1.4.0"
log = "0.4.29"

[dev-dependencies]
axum-test = "17"
reqwest = { version = "0.13", features = ["json"] }
tempfile = "3.27.0"
