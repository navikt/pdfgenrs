[package]
name = "pdfgen-rs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pdfgen-rs"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.7"
serde_json = "1"
handlebars = "6"
chrono = { version = "0.4", features = ["serde"] }
base64 = "0.22"
prometheus = { version = "0.14", features = ["process"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
walkdir = "2"
anyhow = "1"
once_cell = "1"
typst = "0.14"
typst-pdf = "0.14"
typst-library = "0.14"
typst-syntax = "0.14"
