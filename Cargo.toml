[package]
name = "pdfgenrs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pdfgenrs"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.8"
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
prometheus = { version = "0.14", features = ["process"] }
walkdir = "2"
anyhow = "1"
once_cell = "1"
typst = "0.14"
typst-pdf = "0.14"
typst-library = "0.14"
typst-syntax = "0.14"
log4rs = "1.4.0"
log = "0.4.29"
