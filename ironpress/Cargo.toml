[package]
edition = "2024"
rust-version = "1.85"
name = "ironpress"
version = "1.4.3"
build = false
exclude = [
    ".github/",
    ".claude/",
    "target/",
    "docs/",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Pure Rust HTML/CSS/Markdown to PDF converter with layout engine, LaTeX math, tables, images, custom fonts, and streaming output. No browser, no system dependencies."
documentation = "https://docs.rs/ironpress"
readme = "README.md"
keywords = [
    "pdf",
    "html",
    "css",
    "markdown",
    "converter",
]
categories = [
    "text-processing",
    "encoding",
    "template-engine",
]
license = "MIT"
repository = "https://github.com/gastongouron/ironpress"

[features]
async = ["tokio"]
default = []
remote = ["ureq"]
wasm = [
    "wasm-bindgen",
    "js-sys",
    "getrandom/wasm_js",
]

[lib]
name = "ironpress"
crate-type = [
    "cdylib",
    "rlib",
]
path = "src/lib.rs"

[[bin]]
name = "ironpress"
path = "src/bin/cli.rs"

[[test]]
name = "parity_tests"
path = "tests/parity_tests.rs"

[[test]]
name = "pdf_smoke_tests"
path = "tests/pdf_smoke_tests.rs"

[[test]]
name = "proptest_properties"
path = "tests/proptest_properties.rs"

[[bench]]
name = "conversion"
path = "benches/conversion.rs"
harness = false

[dependencies.flate2]
version = "1"

[dependencies.fontdb]
version = "0.23"

[dependencies.getrandom]
version = "0.3"
optional = true

[dependencies.html5ever]
version = "0.38"

[dependencies.image]
